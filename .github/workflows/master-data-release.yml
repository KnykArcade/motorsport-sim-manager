name: Publish Master Data Archive

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example master-data-2026-07-13
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run archive:data
      - name: Assemble release package
        run: cp docs/master-data/Motorsport_Sim_Manager_FINAL_MASTER_ARCHIVE_1990_2026.xlsx artifacts/master-archive/current/
      - name: Publish permanent recovery release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: >-
          gh release create "$RELEASE_TAG"
          artifacts/master-archive/current/*
          --title "Master Data Archive $RELEASE_TAG"
          --generate-notes
          --latest=false
